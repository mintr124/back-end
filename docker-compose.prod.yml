services:
  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ragdb}
      MYSQL_USER: ${MYSQL_USER:-rag}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  postgres-fga:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_FGA_USER:-fga}
      POSTGRES_PASSWORD: ${POSTGRES_FGA_PASSWORD:?POSTGRES_FGA_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_FGA_DB:-fga}
    volumes:
      - postgres_fga_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  openfga-migrate:
    image: openfga/openfga:latest
    command: migrate
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://${POSTGRES_FGA_USER:-fga}:${POSTGRES_FGA_PASSWORD:?POSTGRES_FGA_PASSWORD is required}@postgres-fga:5432/${POSTGRES_FGA_DB:-fga}
    depends_on:
      postgres-fga:
        condition: service_healthy
    restart: "no"

  openfga:
    image: openfga/openfga:latest
    command: run --playground-enabled --authn-method=none
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://${POSTGRES_FGA_USER:-fga}:${POSTGRES_FGA_PASSWORD:?POSTGRES_FGA_PASSWORD is required}@postgres-fga:5432/${POSTGRES_FGA_DB:-fga}
      OPENFGA_LOG_LEVEL: info
      OPENFGA_PLAYGROUND_ENABLED: "true"
    depends_on:
      openfga-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
    volumes:
      - minio_data:/data
    restart: unless-stopped

  chroma:
    image: chromadb/chroma:0.5.17
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ${BACKEND_ENV_FILE:-.env}
    environment:
      PYTHONPATH: /app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      openfga:
        condition: service_started
      minio:
        condition: service_started
      chroma:
        condition: service_started
    expose:
      - "8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ${BACKEND_ENV_FILE:-.env}
    environment:
      PYTHONPATH: /app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      openfga:
        condition: service_started
      minio:
        condition: service_started
      chroma:
        condition: service_started
    command: celery -A app.workers.tasks.celery_app worker -Q ingest_queue -l info --concurrency=1
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    environment:
      API_DOMAIN: ${API_DOMAIN:?API_DOMAIN is required}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  postgres_fga_data:
  minio_data:
  chroma_data:
  caddy_data:
  caddy_config:
