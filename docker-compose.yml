version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: rag-mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ragdb
      MYSQL_USER: rag
      MYSQL_PASSWORD: rag
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: rag-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  postgres-fga:
    image: postgres:15-alpine
    container_name: rag-postgres-fga
    environment:
      POSTGRES_USER: fga
      POSTGRES_PASSWORD: fga
      POSTGRES_DB: fga
    ports:
      - "5432:5432"
    volumes:
      - postgres_fga_data:/var/lib/postgresql/data
    restart: unless-stopped

  openfga:
    image: openfga/openfga:latest
    container_name: rag-openfga
    command: run --playground-enabled
    ports:
      - "8080:8080"
      - "8081:8081"
      - "3000:3000"
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://fga:fga@postgres-fga:5432/fga
      OPENFGA_LOG_LEVEL: info
      OPENFGA_PLAYGROUND_ENABLED: "true"
    depends_on:
      - postgres-fga
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: rag-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  chroma:
    image: chromadb/chroma:0.5.17
    container_name: rag-chroma
    ports:
      - "8100:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma
    restart: unless-stopped

  chroma-ui:
    image: fengzhichao/chromadb-admin:latest
    container_name: rag-chroma-ui
    ports:
      - "3001:3001"
    restart: unless-stopped

  api:
    build: .
    container_name: rag-api
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    depends_on:
      - mysql
      - redis
      - minio
      - openfga
      - chroma
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  worker:
    build: .
    container_name: rag-worker
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    depends_on:
      - mysql
      - redis
      - minio
      - openfga
      - chroma
    command: celery -A app.workers.tasks.celery_app worker -Q ingest_queue -l info
    volumes:
      - .:/app
    restart: unless-stopped

volumes:
  mysql_data:
  minio_data:
  chroma_data:
  postgres_fga_data:
