services:
  mysql:
    image: mysql:8.0
    container_name: rag-mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ragdb
      MYSQL_USER: rag
      MYSQL_PASSWORD: rag
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: rag-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: rag-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  api:
    build: .
    container_name: rag-api
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    depends_on:
      - mysql
      - redis
      - minio
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/data/chroma
    restart: unless-stopped

  worker:
    build: .
    container_name: rag-worker
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    depends_on:
      - mysql
      - redis
      - minio
    command: celery -A app.workers.tasks.celery_app worker -Q ingest_queue -l info
    volumes:
      - chroma_data:/data/chroma
    restart: unless-stopped

volumes:
  mysql_data:
  minio_data:
  chroma_data:
